<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Vital Theory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/store-static/store.css">
</head>
<body>
<main class="wrap" style="max-width:420px;padding:80px 22px">
  <div class="card" style="padding:36px;text-align:center">
    <a class="brand" href="/" style="justify-content:center;margin-bottom:8px"><span class="logo">VT</span> Vital Theory</a>
    <h1 style="font-size:1.5rem;margin:12px 0 4px">Admin sign in</h1>
    <p class="muted" style="font-size:.9rem">Revenue &amp; orders dashboard</p>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat,m in msgs %}<div class="flash flash-{{cat}}">{{m}}</div>{% endfor %}
    {% endwith %}
    <form method="POST" style="margin-top:18px;text-align:left">
      <label for="pw">Password</label>
      <input id="pw" name="password" type="password" required autofocus>
      <button class="btn btn-primary" style="margin-top:18px" type="submit">Sign in →</button>
    </form>
  </div>
</main>
</body>
</html>
